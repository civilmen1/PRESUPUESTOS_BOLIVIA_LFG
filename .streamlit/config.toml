# Configuracion de Streamlit (produccion y diseno).
[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = true
# Sirve archivos de ./static (para publicar el banco y sincronizar el local).
enableStaticServing = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

# Tema sobrio y profesional (azul corporativo / fondo claro).
[theme]
base = "light"
primaryColor = "#1F3B57"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F4F8"
textColor = "#21303F"
font = "sans serif"

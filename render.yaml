# =============================================================================
#  Despliegue en Render.com (https://render.com) — un clic desde tu repo de Git.
#
#  Pasos:
#   1. Sube el repo a GitHub.
#   2. En Render: New + → Blueprint → conecta tu repositorio.
#   3. Render leerá este archivo y creará el servicio con disco persistente.
#   4. Configura las variables marcadas como sync:false en el panel de Render.
# =============================================================================
services:
  - type: web
    name: apu-bolivia-generator
    runtime: docker
    plan: starter            # ajusta el plan según necesidad
    healthCheckPath: /_stcore/health
    disk:
      name: apu-data
      mountPath: /data       # base de datos persistente compartida
      sizeGB: 1
    envVars:
      - key: APU_DB_PATH
        value: /data/proveedores.db
      # Datos de usuario persistentes (banco de APU, aportes, trafico).
      - key: APU_PERSIST_DIR
        value: /data
      - key: APU_EXPORT_DIR
        value: /data/exports
      - key: APU_UPLOAD_DIR
        value: /data/uploads
      - key: APU_LOG_DIR
        value: /data/logs
      - key: AUTH_SALT
        generateValue: true   # Render genera un secreto seguro
      # Sincronizacion del banco hacia los equipos locales (la nube manda).
      # Publica el banco en /app/static/banco_<token>.json. Copia ese enlace en
      # cada PC local como APU_SYNC_URL.
      - key: APU_SYNC_PUBLISH
        value: "true"
      - key: APU_SYNC_TOKEN
        generateValue: true   # codigo secreto del enlace de sincronizacion
      - key: AUTH_EMAIL_DRY_RUN
        value: "false"   # envia correos reales (requiere SMTP de Gmail abajo)
      - key: EMAIL_DRY_RUN
        value: "true"
      - key: SCRAPER_DRY_RUN
        value: "true"
      # IA: ARRANQUE SEGURO EN MODO OFFLINE (gratis, $0). El sistema usa el
      # extractor por reglas (core/info_extractor.py); no hace llamadas de pago.
      # Para activar la IA mas adelante: pon una API key abajo (GLM_API_KEY para
      # maxima calidad, o GROQ_API_KEY gratis) y cambia este valor a "true".
      - key: USAR_LLM
        value: "false"
      # Verificacion de SEPREC via API oficial (no requiere navegador).
      - key: SEPREC_USAR_NAVEGADOR
        value: "false"
      # Configura estos en el panel de Render (no se versionan):
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: VERIFIK_TOKEN
        sync: false
      # IA por API (configura una en el panel para extraer recursos con IA).
      # IMPORTANTE: ademas de pegar la key, hay que poner USAR_LLM=true arriba.
      # GLM-5.2 (Z.AI): MAXIMA CALIDAD, ~$0.018 por APU. Clave en https://z.ai/
      - key: GLM_API_KEY
        sync: false
      - key: GLM_MODEL
        value: glm-5.2
      # Groq: IA en linea gratis y rapida. Clave en console.groq.com
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Google Analytics 4: pega tu ID de medicion (G-XXXXXXXXXX) en el panel.
      - key: GA_MEASUREMENT_ID
        sync: false
